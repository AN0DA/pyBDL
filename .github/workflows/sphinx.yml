---
name: Docs

"on":
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "pybdl/**"
      - ".github/workflows/sphinx.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "docs/**"
      - "pybdl/**"
      - ".github/workflows/sphinx.yml"
      - "pyproject.toml"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build Sphinx docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install docs dependencies
        run: uv sync --only-group docs

      - name: Build HTML (fail on warnings)
        run: >
          uv run sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: Upload docs as artifact (PRs & pushes)
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: html-docs
          path: docs/_build/html
          retention-days: 7

      - name: Upload GitHub Pages artifact (only main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write  # deploy-pages: publish to GitHub Pages
      id-token: write  # deploy-pages: OIDC authentication with Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
